<div id="loginOverlay" class="login-overlay">
  <div class="login-card">
    <div class="login-logo-wrap">
      <img src="logo.png" alt="ALKAM Logo" class="login-logo" onerror="this.style.display='none'" />
      <div class="login-brand">ALKAM MALİ MÜŞAVİRLİK</div>
    </div>

    <h2 class="login-title">Programa Giriş</h2>

    <form id="loginForm" autocomplete="off">
      <label class="login-label" for="loginPassword">Şifre</label>
      <div class="password-wrap">
        <input
          id="loginPassword"
          name="password"
          type="password"
          inputmode="text"
          autocomplete="current-password"
          autocapitalize="off"
          autocorrect="off"
          spellcheck="false"
          placeholder="Şifrenizi girin"
          required
        />
        <button type="button" id="togglePassword" class="toggle-password" aria-label="Şifreyi göster/gizle">👁</button>
      </div>

      <button type="submit" class="login-btn">Giriş Yap</button>
      <div id="loginError" class="login-error"></div>
    </form>
  </div>
</div>
