<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALKAM Ön Muhasebe</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }
    .app {
      display: grid;
      grid-template-columns: 360px 1fr;
      min-height: 100vh;
    }
    .panel {
      background: #fff;
      border-right: 1px solid #e5e7eb;
      padding: 20px;
      overflow: auto;
    }
    .content {
      padding: 20px;
      overflow: auto;
    }
    .title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .section {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    input, select, textarea, button {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 10px;
    }
    textarea {
      min-height: 90px;
      resize: vertical;
    }
    button {
      cursor: pointer;
      background: #111827;
      color: #fff;
      border: none;
      font-weight: 600;
    }
    button:hover { opacity: 0.95; }
    .btn-secondary { background: #2563eb; }
    .btn-danger { background: #dc2626; }
    .btn-small {
      width: auto;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 12px;
      margin: 0;
    }
    .cari-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .cari-item {
      width: 100%;
      text-align: left;
      background: #f9fafb;
      color: #111827;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 12px;
    }
    .cari-item.active {
      border-color: #2563eb;
      background: #eff6ff;
    }
    .cari-item-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
    .cari-item-title {
      font-weight: 700;
      font-size: 15px;
    }
    .cari-item-bakiye {
      font-weight: 700;
      font-size: 14px;
    }
    .pozitif { color: #047857; }
    .negatif { color: #b91c1c; }
    .cari-item-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
      color: #6b7280;
      font-size: 12px;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    .grid-5 {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }
    .card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px;
    }
    .card-label {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 6px;
    }
    .card-value {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.3;
    }
    .muted {
      color: #6b7280;
      font-size: 13px;
      line-height: 1.5;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }
    th, td {
      border-bottom: 1px solid #e5e7eb;
      padding: 10px 8px;
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }
    th {
      background: #f9fafb;
      font-weight: 700;
    }
    .text-right { text-align: right; }
    .center { text-align: center; }
    .empty-state {
      padding: 20px;
      text-align: center;
      border: 1px dashed #d1d5db;
      border-radius: 14px;
      background: #fafafa;
    }
    .empty-title {
      font-weight: 700;
      margin-bottom: 6px;
    }
    .empty-text {
      color: #6b7280;
      font-size: 13px;
    }
    .top-actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }
    .top-actions button {
      margin-bottom: 0;
    }
    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .grid-2, .grid-5 { grid-template-columns: 1fr; }
      .panel { border-right: none; border-bottom: 1px solid #e5e7eb; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel">
      <div class="title">ALKAM Sistem</div>

      <div class="section">
        <div class="section-title">Cari Ara</div>
        <input id="cariArama" type="text" placeholder="Cari adı, telefon, e-posta..." />
      </div>

      <div class="section">
        <div class="section-title">Yeni Cari</div>
        <form id="cariForm">
          <input id="cariAd" type="text" placeholder="Cari adı" />
          <input id="cariTelefon" type="text" placeholder="Telefon" />
          <input id="cariEmail" type="email" placeholder="E-posta" />
          <textarea id="cariNot" placeholder="Not"></textarea>
          <button type="submit">Cari Ekle</button>
        </form>
      </div>

      <div class="section">
        <div class="section-title">Cari Listesi</div>
        <div id="cariListesi" class="cari-list"></div>
      </div>
    </aside>

    <main class="content">
      <div class="section">
        <div class="section-title">Yeni Hareket</div>
        <form id="hareketForm">
          <div class="grid-2">
            <div>
              <select id="hareketCari"></select>
            </div>
            <div>
              <select id="hareketTur">
                <option value="tahakkuk">Tahakkuk</option>
                <option value="tahsilat">Tahsilat</option>
                <option value="odeme">Ödeme</option>
                <option value="gelir">Gelir</option>
                <option value="gider">Gider</option>
              </select>
            </div>
          </div>

          <div class="grid-2">
            <div>
              <input id="hareketAltTur" type="text" placeholder="Alt tür (nakit, banka, muhasebe...)" />
            </div>
            <div>
              <input id="hareketTarih" type="date" />
            </div>
          </div>

          <div class="grid-2">
            <div>
              <input id="hareketTutar" type="text" placeholder="Tutar" />
            </div>
            <div>
              <input id="hareketAciklama" type="text" placeholder="Açıklama" />
            </div>
          </div>

          <button type="submit">Hareket Kaydet</button>
        </form>

        <div class="top-actions">
          <button id="btnOrnekData" type="button" class="btn-secondary">Örnek Veri Yükle</button>
        </div>
      </div>

      <div id="detayBos" class="section">
        <div class="empty-state">
          <div class="empty-title">Cari seçilmedi</div>
          <div class="empty-text">Soldan bir cari seç veya yeni cari ekle.</div>
        </div>
      </div>

      <div id="cariDetay" style="display:none;">
        <div class="section">
          <div class="section-title">Cari Detayı</div>
          <div style="font-size:24px;font-weight:700;margin-bottom:8px;" id="detayBaslik"></div>
          <div id="detayAlt" class="muted"></div>

          <div class="top-actions" style="margin-top:16px;">
            <button id="btnCariSil" type="button" class="btn-danger">Cariyi Sil</button>
          </div>
        </div>

        <div class="section">
          <div class="section-title">Özet</div>
          <div class="grid-5">
            <div class="card">
              <div class="card-label">Bakiye</div>
              <div class="card-value" id="ozetBakiye">₺0,00</div>
            </div>
            <div class="card">
              <div class="card-label">Toplam Borç</div>
              <div class="card-value" id="ozetToplamBorc">₺0,00</div>
            </div>
            <div class="card">
              <div class="card-label">Toplam Tahsilat</div>
              <div class="card-value" id="ozetToplamTahsilat">₺0,00</div>
            </div>
            <div class="card">
              <div class="card-label">Son Tahakkuk</div>
              <div class="muted" id="ozetSonTahakkuk">Kayıt yok</div>
            </div>
            <div class="card">
              <div class="card-label">Son Tahsilat</div>
              <div class="muted" id="ozetSonTahsilat">Kayıt yok</div>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-title">Hareketler</div>
          <div style="overflow:auto;">
            <table>
              <thead>
                <tr>
                  <th>Tarih</th>
                  <th>Tür</th>
                  <th>Alt Tür</th>
                  <th>Açıklama</th>
                  <th class="text-right">Tutar</th>
                  <th class="text-right">İşlem</th>
                </tr>
              </thead>
              <tbody id="hareketTabloBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
