name: Automation Inventory Check

on:
  pull_request:
    paths:
      - 'index.html'
      - 'alkam-cariler-data.js'
      - 'alkam-monthly-accrual-engine-v1.js'
      - 'docs/otomasyon-denetim-envanteri.md'
      - 'tools/check-automation-inventory.mjs'
      - 'package.json'
      - '.github/workflows/automation-inventory-check.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  automation-inventory:
    name: Check automation inventory and May accrual guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run automation inventory check
        run: npm run test:automation-inventory
