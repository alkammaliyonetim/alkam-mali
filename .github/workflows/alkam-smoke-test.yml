name: IstasyonALKAM Bot Preview Test

on:
  push:
    branches:
      - safe-bank-import-v1
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      test_url:
        description: 'Test edilecek ALKAM preview linki'
        required: false
        default: 'https://safe-bank-import-v1.alkam-mali.pages.dev/'

jobs:
  istasyonalkam-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm init -y
          npm install -D playwright
          npx playwright install --with-deps chromium

      - name: Run IstasyonALKAM bank check
        env:
          ALKAM_TEST_URL: ${{ github.event.inputs.test_url || 'https://safe-bank-import-v1.alkam-mali.pages.dev/' }}
        run: node tools/istasyonalkam-bank-check.mjs

      - name: Run IstasyonALKAM operation check
        env:
          ALKAM_TEST_URL: ${{ github.event.inputs.test_url || 'https://safe-bank-import-v1.alkam-mali.pages.dev/' }}
        run: node tools/istasyonalkam-operation-check.mjs

      - name: Run IstasyonALKAM sample flow
        env:
          ALKAM_TEST_URL: ${{ github.event.inputs.test_url || 'https://safe-bank-import-v1.alkam-mali.pages.dev/' }}
        run: node tools/istasyonalkam-operation-flow-check.mjs

      - name: Upload bot output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: istasyonalkam-bot-output
          path: test-output
