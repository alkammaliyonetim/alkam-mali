name: IstasyonALKAM Bot Preview Test

on:
  push:
    branches:
      - main
      - safe-bank-import-v1
      - luca-sync
      - luca-fix
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      test_url:
        description: 'Test edilecek ALKAM linki'
        required: false
        default: 'https://alkam-mali.pages.dev/'

jobs:
  istasyonalkam-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm init -y
          npm install -D playwright
          npx playwright install --with-deps chromium

      - name: Run IstasyonALKAM bank check
        env:
          ALKAM_TEST_URL: ${{ github.event.inputs.test_url || 'https://alkam-mali.pages.dev/' }}
        run: node tools/istasyonalkam-bank-check.mjs

      - name: Run IstasyonALKAM operation check
        env:
          ALKAM_TEST_URL: ${{ github.event.inputs.test_url || 'https://alkam-mali.pages.dev/' }}
        run: node tools/istasyonalkam-operation-check.mjs

      - name: Run IstasyonALKAM sample flow
        env:
          ALKAM_TEST_URL: ${{ github.event.inputs.test_url || 'https://alkam-mali.pages.dev/' }}
        run: node tools/istasyonalkam-operation-flow-check.mjs

      - name: Run IstasyonALKAM mobile cari check
        env:
          ALKAM_TEST_URL: ${{ github.event.inputs.test_url || 'https://alkam-mali.pages.dev/' }}
        run: node tools/istasyonalkam-mobile-cari-check.mjs

      - name: Run IstasyonALKAM Telegram check
        env:
          ALKAM_TEST_URL: ${{ github.event.inputs.test_url || 'https://alkam-mali.pages.dev/' }}
        run: node tools/istasyonalkam-telegram-check.mjs

      - name: Run ALKAM live visual check
        env:
          ALKAM_TEST_URL: ${{ github.event.inputs.test_url || 'https://alkam-mali.pages.dev/' }}
        run: node tools/alkam-live-visual-check.mjs

      - name: Run IstasyonALKAM approval posting stress on checked-out branch
        run: |
          python3 -m http.server 4173 > /tmp/alkam-local-server.log 2>&1 &
          sleep 2
          ALKAM_TEST_URL=http://127.0.0.1:4173/ node tools/istasyonalkam-approval-posting-stress.mjs

      - name: Run IstasyonALKAM automation check
        env:
          ALKAM_TEST_URL: ${{ github.event.inputs.test_url || 'https://alkam-mali.pages.dev/' }}
        run: node tools/istasyonalkam-automation-check.mjs

      - name: Run IstasyonALKAM Luca sync check
        if: github.ref_name == 'luca-sync' || github.head_ref == 'luca-sync' || github.ref_name == 'luca-fix' || github.head_ref == 'luca-fix'
        env:
          ALKAM_TEST_URL: ${{ github.event.inputs.test_url || 'https://luca-fix.alkam-mali.pages.dev/' }}
        run: node tools/istasyonalkam-luca-sync-check.mjs

      - name: Upload bot output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: istasyonalkam-bot-output
          path: test-output
