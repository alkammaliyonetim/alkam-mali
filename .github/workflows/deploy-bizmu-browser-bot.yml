name: Deploy Bizmu Browser Bot

on:
  workflow_dispatch:
  push:
    paths:
      - 'bizmu-browser-bot/**'
      - '.github/workflows/deploy-bizmu-browser-bot.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bizmu-browser-bot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: bizmu-browser-bot/package.json

      - name: Install dependencies
        run: npm install

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set Bizmu secrets
        run: |
          printf "%s" "${{ secrets.BIZMU_EMAIL }}" | npx wrangler secret put BIZMU_EMAIL
          printf "%s" "${{ secrets.BIZMU_PASSWORD }}" | npx wrangler secret put BIZMU_PASSWORD
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
