name: Codex Safe Index Patch

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.codex-trigger-index-patch.txt'
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  patch-index:
    if: github.event_name != 'issues' || contains(github.event.issue.title, 'ALKAM-CODEX-SAFE-PATCH')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply safe index patch
        run: node .github/scripts/codex-index-patch.js index.html

      - name: Verify scripts
        shell: bash
        run: |
          node - <<'NODE'
          const fs=require('fs');
          const html=fs.readFileSync('index.html','utf8');
          const scripts=[...html.matchAll(/<script>([\s\S]*?)<\/script>/g)].map(m=>m[1]);
          for (const s of scripts) new Function(s);
          console.log('syntax_ok scripts=' + scripts.length);
          NODE

      - name: Commit patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Apply safe cari ledger source patch" || echo "No changes to commit"
          git push

      - name: Report success
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({owner:context.repo.owner,repo:context.repo.repo,issue_number:context.issue.number,body:'✅ Codex güvenli index düzeltmesi uygulandı ve script kontrolü geçti.'});
            await github.rest.issues.update({owner:context.repo.owner,repo:context.repo.repo,issue_number:context.issue.number,state:'closed',state_reason:'completed'});
