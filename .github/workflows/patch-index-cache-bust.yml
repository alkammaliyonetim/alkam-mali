name: Patch index cache bust

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/patch-index-cache-bust.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Patch script cache bust
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8-sig')
          s2 = s.replace('src="alkam-product-master-v1.js"', 'src="alkam-product-master-v1.js?v=1205261358"')
          if s2 == s:
              s2 = s.replace("src='alkam-product-master-v1.js'", "src='alkam-product-master-v1.js?v=1205261358'")
          p.write_text(s2, encoding='utf-8')
          PY
      - name: Commit if changed
        run: |
          if git diff --quiet; then
            echo "No change"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Index dış modül cache kırıcı sürüm eklendi"
          git push
# trigger: 120526-1400
