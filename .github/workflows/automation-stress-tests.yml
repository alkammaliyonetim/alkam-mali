name: Automation Stress Tests

on:
  pull_request:
    paths:
      - 'tools/automation-stress-check.mjs'
      - 'package.json'
      - '.github/workflows/automation-stress-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  automation-stress:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run stress check
        run: npm run test:automation-stress
