name: Live cari history check

on:
  push:
    paths:
      - '.github/workflows/live-cari-check.yml'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y
          npm i playwright
          npx playwright install chromium --with-deps

      - name: Check live cari history
        run: |
          cat > live-cari-check.js <<'JS'
          const { chromium } = require('playwright');
          const fs = require('fs');

          const url = 'https://alkam-mali.pages.dev/admin.html?v=2f4be2';

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({ viewport: { width: 1440, height: 1000 } });
            const result = {
              url,
              ok: false,
              checks: {},
              notes: [],
              time: new Date().toISOString()
            };

            try {
              await page.goto(url, { waitUntil: 'networkidle', timeout: 60000 });
              await page.screenshot({ path: '01-opened.png', fullPage: true });

              const bodyText = await page.locator('body').innerText({ timeout: 15000 });
              result.checks.hasAlkam = /ALKAM|Mali|İstasyON|Istasyon/i.test(bodyText);
              result.checks.hasCariWord = /Cari|Cariler|Ekstre/i.test(bodyText);

              const possibleLogin = /şifre|password|giriş|login/i.test(bodyText);
              result.checks.possibleLogin = possibleLogin;

              const cariButtons = page.locator('text=/Cariler|Cari Ekstre|Cari/i');
              const cariCount = await cariButtons.count();
              result.checks.cariButtonCount = cariCount;
              if (cariCount > 0) {
                await cariButtons.nth(0).click({ timeout: 10000 }).catch(() => {});
                await page.waitForTimeout(1500);
              }

              await page.screenshot({ path: '02-after-cari-click.png', fullPage: true });

              const rows = page.locator('table tbody tr, .list-item, .row-clickable');
              const rowCount = await rows.count().catch(() => 0);
              result.checks.rowCountAfterCariClick = rowCount;

              if (rowCount > 0) {
                await rows.nth(0).click({ timeout: 10000 }).catch(() => {});
                await page.waitForTimeout(1500);
              }

              await page.screenshot({ path: '03-after-first-cari-select.png', fullPage: true });

              const afterText = await page.locator('body').innerText({ timeout: 15000 });
              result.checks.hasSelectedCariDetail = /Bakiye|Borç|Alacak|Tahakkuk|Tahsilat|Kaynak|Ekstre|Hareket/i.test(afterText);
              result.checks.hasHistorySignals = /Kaynak|Tahakkuk|Tahsilat|İşlem|Bakiye/i.test(afterText);
              result.ok = result.checks.hasAlkam && result.checks.hasCariWord && result.checks.hasSelectedCariDetail;

              if (!result.ok) {
                result.notes.push('Canlı sayfa açıldı ama cari geçmişi sinyalleri eksik veya giriş ekranında kalmış olabilir.');
              }
            } catch (err) {
              result.error = err.message;
              await page.screenshot({ path: 'error.png', fullPage: true }).catch(() => {});
            } finally {
              fs.writeFileSync('live-cari-check-result.json', JSON.stringify(result, null, 2));
              await browser.close();
              if (!result.ok) process.exitCode = 1;
            }
          })();
          JS
          node live-cari-check.js

      - name: Upload screenshots and result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-cari-check-artifacts
          path: |
            *.png
            live-cari-check-result.json
